version: 2

sources:
  - name: avistamientos
    description: >
      Datos en bruto de avistamientos ciudadanos de iNaturalist y áreas
      protegidas de España. Cargados desde CSV a Snowflake Bronze.
    schema: AVISTAMIENTOS
    database: "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_BRONZE_DB"

    tables:

      - name: areas
        description: >
          Espacios naturales protegidos de España.
          Granularidad: una fila por área protegida.
        columns:
          - name: id_area
            description: ID natural del área protegida.
            data_type: number
            tests:
              - unique
              - not_null:
                  config:
                    severity: warn

          - name: nombre
            description: Nombre del espacio protegido.
            data_type: varchar
            tests:
              - not_null

          - name: es_lic
            description: TRUE si es Lugar de Importancia Comunitaria.
            data_type: boolean
            tests:
              - not_null

          - name: es_zepa
            description: TRUE si es Zona de Especial Protección para las Aves.
            data_type: boolean
            tests:
              - not_null

          - name: es_parque_nacional
            description: TRUE si tiene figura de Parque Nacional.
            data_type: boolean
            tests:
              - not_null

          - name: provincia
            description: Provincia del área protegida.
            data_type: varchar

          - name: ccaa
            description: Comunidad autónoma del área protegida.
            data_type: varchar

          - name: lat_min
            description: Latitud mínima del bounding box del área.
            data_type: number


          - name: lat_max
            description: Latitud máxima del bounding box del área.
            data_type: number


          - name: lon_min
            description: Longitud mínima del bounding box del área.
            data_type: number


          - name: lon_max
            description: Longitud máxima del bounding box del área.
            data_type: number


          - name: superficie_ha
            description: Superficie en hectáreas.
            data_type: number

          - name: anio_declaracion
            description: Año de declaración del espacio protegido.
            data_type: number

          - name: entidad_gestora
            description: Entidad responsable del área protegida.
            data_type: varchar

          - name: codigo_red_natura
            description: Código oficial Red Natura 2000.
            data_type: varchar

      - name: observaciones
        description: >
          Avistamientos de fauna registrados por ciudadanos en iNaturalist.
          Granularidad: una fila por avistamiento.
        columns:
          - name: id
            description: ID único del avistamiento en iNaturalist.
            data_type: number
            tests:
              - unique:
                  config:
                    severity: warn
              - not_null

          - name: observed_on
            description: Fecha del avistamiento.
            data_type: varchar
            tests:
              - not_null

          - name: time_observed_at
            description: Timestamp UTC del avistamiento.
            data_type: varchar

          - name: latitude
            description: Latitud GPS del avistamiento.
            data_type: varchar

          - name: longitude
            description: Longitud GPS del avistamiento.
            data_type: varchar

          - name: positional_accuracy
            description: Precisión GPS del avistamiento.
            data_type: number

          - name: place_county_name
            description: Provincia del avistamiento.
            data_type: varchar

          - name: place_country_name
            description: País del avistamiento. Usado solo para filtrar España en staging.
            data_type: varchar

          - name: scientific_name
            description: Nombre científico de la especie identificada.
            data_type: varchar

          - name: iconic_taxon_name
            description: Grupo taxonómico principal usado para filtrar Mammalia y Aves.
            data_type: varchar
            tests:
              - not_null:
                  config:
                    severity: warn

          - name: taxon_family_name
            description: Familia taxonómica de la especie.
            data_type: varchar

          - name: verificado
            description: TRUE si un experto confirmó la identificación.
            data_type: varchar