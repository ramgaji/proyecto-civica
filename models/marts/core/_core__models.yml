version: 2

models:

  # ==========================================================================
  # dim_area_protegida
  # ==========================================================================
  - name: dim_area_protegida
    description: >
      Dimensión de áreas protegidas desnormalizada para BI.
      Incluye provincia, CCAA, entidad gestora y bounding box para el join espacial.
    columns:
      - name: id_area_protegida
        tests:
          - not_null
          # unique eliminado: ya testeado en stg_mix__area_protegida.
          # La dim es una proyección del mismo dato; doblar el test solo
          # duplica coste sin añadir cobertura nueva.

      - name: nombre
        tests:
          - not_null
          # redundante respecto a Silver pero se mantiene como contrato
          # mínimo de la dimensión para detectar regresiones en el JOIN.

      - name: es_lic
        # not_null eliminado: ya testeado en Silver.
        # En Gold solo añaden valor los tests sobre columnas computadas aquí.

      - name: es_zepa
        # not_null eliminado: ya testeado en Silver.

      - name: es_parque_nacional
        # not_null eliminado: ya testeado en Silver.

      - name: nombre_provincia
        # nullable por diseño: áreas sin provincia asignada tienen NULL.

      - name: ccaa
        # nullable por diseño: mismo motivo que nombre_provincia.

      - name: entidad_gestora
        # nullable por diseño: áreas sin entidad asignada tienen NULL.

      - name: codigo_red_natura
      
      - name: lat_min

      - name: lat_max

      - name: lon_min

      - name: lon_max

  # ==========================================================================
  # dim_especie
  # ==========================================================================
  - name: dim_especie
    description: >
      Dimensión de especies desnormalizada desde el snapshot SCD2 vigente.
    columns:
      - name: id_especie
        tests:
          - not_null
          # unique eliminado: ya testeado en stg_mix__especie y en el snapshot.
          # Si hay duplicados aquí es un bug del snapshot que debe detectarse allí.

      - name: nombre_cientifico
        tests:
          - not_null
          # unique eliminado: mismo argumento que id_especie.

      - name: nombre_comun_es
      - name: nombre_comun_en
      - name: nombre_familia
      - name: nombre_clase
      - name: estado_iucn
      - name: estado_espana

      - name: endemismo
        tests:
          - not_null
          # Se mantiene: es un campo computado en Gold (heredado del snapshot).
          # Confirma que el CASE en dim_especie no produce NULL.

      - name: es_migratoria
        tests:
          - not_null
          # Se mantiene: columna computada aquí con CASE WHEN mig.nombre IS NULL.
          # El not_null confirma que el CASE siempre produce true/false.

      - name: tipo_migracion
      - name: cites_apendice

  # ==========================================================================
  # dim_fecha
  # ==========================================================================
  - name: dim_fecha
    description: >
      Dimensión temporal generada desde los avistamientos Silver.
      Granularidad estricta: una fila por fecha (DATE).
      La hora local y la franja horaria se calculan en fct_avistamiento
      donde vive hora_utc — dim_fecha solo contiene atributos de la fecha.
    columns:
      - name: fecha
        tests:
          - unique  # única columna donde unique tiene sentido: es la PK de la dim
          - not_null

      - name: anio
        # not_null eliminado: derivado de fecha con EXTRACT.
        # Si fecha no es null (ya testeado), anio tampoco puede serlo.

      - name: mes
        # not_null eliminado: mismo argumento.

      - name: estacion
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Invierno', 'Primavera', 'Verano', 'Otoño']
          # accepted_values se mantiene: el CASE tiene 4 ramas explícitas
          # y confirma que ningún mes queda fuera del rango esperado.

      - name: dia_semana
        # not_null eliminado: derivado de fecha con dayofweek().

      - name: nombre_mes
        # not_null eliminado: derivado de fecha con CASE sobre EXTRACT(month).

  # ==========================================================================
  # dim_lugar
  # ==========================================================================
  - name: dim_lugar
    description: Dimensión geográfica de provincias españolas con CCAA desnormalizada.
    columns:
      - name: id_provincia
        tests:
          - not_null

      - name: provincia
        tests:
          - not_null

      - name: id_ccaa
        # sin test: nullable para provincias sin CCAA asignada (zonas fronterizas).

      - name: ccaa
        tests:
          - not_null
          # Se mantiene pero debería ser severity: warn si hay provincias
          # de Gibraltar o fronterizas sin CCAA mapeada en el seed.
          # Ajustar a warn si el test falla en tu entorno.
  
  - name: dim_ccaa
    description: Dimensión geográfica de provincias españolas con CCAA desnormalizada.
    columns:
      - name: id_ccaa
        tests:
          - not_null

      - name: ccaa
        tests:
          - not_null

  - name: dim_especie_censo
    description: >
      Dimensión de especies restringida a las que tienen al menos un censo.
      Subconjunto de dim_especie filtrado por INNER JOIN con stg_mix__censo_poblacion.
      Evita exponer en BI el catálogo completo cuando el contexto es censos.
    columns:

      - name: id_especie
        tests:
          - unique
          - not_null

      - name: nombre_cientifico
        tests:
          - unique
          - not_null

      - name: nombre_comun_es

      - name: nombre_clase

      - name: nombre_familia

      - name: estado_iucn

      - name: estado_espana

      - name: endemismo
        tests:
          - not_null

      - name: es_migratoria
        tests:
          - not_null

      - name: cites_apendice