version: 2

models:

  # ==========================================================================
  # dim_area_protegida
  # ==========================================================================
  - name: dim_area_protegida
    description: >
      Dimensión de áreas protegidas desnormalizada para BI.
      Incluye provincia, CCAA, entidad gestora y bounding box para el join espacial.
    columns:
      - name: id_area_protegida
        tests:
          - not_null


      - name: nombre
        tests:
          - not_null


      - name: es_lic


      - name: es_zepa


      - name: es_parque_nacional


      - name: nombre_provincia


      - name: ccaa


      - name: entidad_gestora


      - name: codigo_red_natura
      
      - name: lat_min

      - name: lat_max

      - name: lon_min

      - name: lon_max

  # ==========================================================================
  # dim_especie
  # ==========================================================================
  - name: dim_especie
    description: >
      Dimensión de especies desnormalizada desde el snapshot SCD2 vigente.
    columns:
      - name: id_especie
        tests:
          - not_null


      - name: nombre_cientifico
        tests:
          - not_null


      - name: nombre_comun_es
      - name: nombre_comun_en
      - name: nombre_familia
      - name: nombre_clase
      - name: estado_iucn
      - name: estado_espana

      - name: endemismo
        tests:
          - not_null

      - name: es_migratoria
        tests:
          - not_null


      - name: tipo_migracion
      - name: cites_apendice

  # ==========================================================================
  # dim_fecha
  # ==========================================================================
  - name: dim_fecha
    description: >
      Dimensión temporal generada desde los avistamientos Silver.
      Granularidad estricta: una fila por fecha (DATE).
      La hora local y la franja horaria se calculan en fct_avistamiento
      donde vive hora_utc — dim_fecha solo contiene atributos de la fecha.
    columns:
      - name: fecha
        tests:
          - unique  
          - not_null

      - name: anio


      - name: mes


      - name: estacion
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Invierno', 'Primavera', 'Verano', 'Otoño']


      - name: dia_semana


      - name: nombre_mes


  # ==========================================================================
  # dim_lugar
  # ==========================================================================
  - name: dim_lugar
    description: Dimensión geográfica de provincias españolas con CCAA desnormalizada.
    columns:
      - name: id_provincia
        tests:
          - not_null

      - name: provincia
        tests:
          - not_null


      - name: ccaa
        tests:
          - not_null

  
  - name: dim_ccaa
    description: Dimensión geográfica de provincias españolas con CCAA desnormalizada.
    columns:
      - name: id_ccaa
        tests:
          - not_null

      - name: ccaa
        tests:
          - not_null

  - name: dim_especie_censo
    description: >
      Dimensión de especies restringida a las que tienen al menos un censo.
      Subconjunto de dim_especie filtrado por INNER JOIN con stg_mix__censo_poblacion.
      Evita exponer en BI el catálogo completo cuando el contexto es censos.
    columns:

      - name: id_especie


      - name: nombre_cientifico


      - name: nombre_comun_es

      - name: nombre_clase

      - name: nombre_familia

      - name: estado_iucn

      - name: estado_espana

      - name: endemismo
        tests:
          - not_null

      - name: es_migratoria
        tests:
          - not_null

      - name: cites_apendice