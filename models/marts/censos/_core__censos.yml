version: 2

models:

  - name: fct_censo_anual
    description: >
      Tabla de hechos anual de censos poblacionales.
      Calcula variaciones temporales y tendencias mediante funciones window.
    columns:

      - name: id_censo
        tests:
          - unique
          - not_null

      - name: id_especie

      - name: id_provincia


      - name: ccaa


      - name: anio
        tests:
          - not_null

      - name: n_individuos_estimados


      - name: n_parejas_reproductoras


      - name: variacion_vs_anterior


      - name: variacion_pct_vs_anterior


      - name: tendencia
        tests:
          - accepted_values:
              arguments:
                values:
                  - 'alza'
                  - 'baja'
                  - 'estable'
                  - 'sin_referencia'
