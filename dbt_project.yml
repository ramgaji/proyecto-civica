# ============================================================================
# dbt_project.yml — Proyecto Civica (Fauna España)
# ============================================================================

name: 'proyecto-civica'
version: '1.0.0'
config-version: 2

profile: 'default'

# ----------------------------------------------------------------------------
# Rutas de archivos
# ----------------------------------------------------------------------------
model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]
docs-paths:     ["docs"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ----------------------------------------------------------------------------
# Variables de proyecto
# ----------------------------------------------------------------------------
vars:
  min_fecha_avistamiento: '2020-01-01'
  min_anio_censo: 2018

# ============================================================================
# MODELOS
# ============================================================================
models:
  +transient: false

  proyecto-civica:

    # ------------------------------------------------------------------------
    # STAGING — Capa Silver
    # ------------------------------------------------------------------------
    staging:
      +materialized: view
      +database: "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_SILVER_DB"

      avistamientos:
        +schema: avistamientos

      especies:
        +schema: especies

      mix:
        +schema: mix

    # ------------------------------------------------------------------------
    # MARTS — Capa Gold
    # ------------------------------------------------------------------------
    marts:
      +materialized: table
      +database: "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_GOLD_DB"

      # Dimensiones compartidas por todos los marts
      core:
        +schema: core

      # Área 1 — Alertas y seguimiento en campo
      avistamientos:
        +schema: avistamientos

      # Área 2 — Censos y predicción de poblaciones
      censos:
        +schema: censos

      # Área 3 — Diversidad ecológica por CCAA
      diversidad:
        +schema: diversidad

# ============================================================================
# SEEDS — Solo España
# ============================================================================
seeds:
  +schema: seed_data
  +database: "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_BRONZE_DB"

  proyecto-civica:
    provincia_ccaa:
      +column_types:
        id_provincia: INTEGER
        nombre:       VARCHAR(100)
        ccaa:         VARCHAR(100)

    estado_conservacion:
      +column_types:
        id_estado:    INTEGER
        codigo:       VARCHAR(10)
        descripcion:  VARCHAR(200)
        nivel_riesgo: INTEGER

    tipo_amenaza:
      +column_types:
        id_tipo_amenaza: INTEGER
        nombre:          VARCHAR(100)
        descripcion:     VARCHAR(300)

# ============================================================================
# SNAPSHOTS — SCD Tipo 2
# ============================================================================
snapshots:
  +transient: false
  +target_database: "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_SILVER_DB"
  +target_schema: snapshots

