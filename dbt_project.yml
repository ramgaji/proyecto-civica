 # ============================================================================
# dbt_project.yml — Proyecto Civica (Fauna España)
# ============================================================================
# Pipeline de datos de biodiversidad y conservación de fauna en España.
# Fuentes: iNaturalist (avistamientos), MITECO/SEO (censos), Red Natura 2000.
#
# Arquitectura Medallion:
#   BRONZE → raw ingestion (CSV cargados a Snowflake)
#   SILVER → staging + normalización (vistas dbt)
#   GOLD   → marts dimensionales para análisis y BI
# ============================================================================

name: 'proyecto-civica'
version: '1.0.0'
config-version: 2

profile: 'default'

# ----------------------------------------------------------------------------
# Rutas de archivos
# ----------------------------------------------------------------------------
model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]
docs-paths:     ["docs"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ----------------------------------------------------------------------------
# Hooks a nivel de proyecto
# ----------------------------------------------------------------------------
#on-run-start:
#  - "ALTER WAREHOUSE WH_CURSO_DATA_ENGINEERING RESUME IF SUSPENDED;"

# ----------------------------------------------------------------------------
# Variables de proyecto
# ----------------------------------------------------------------------------
vars:
  min_fecha_avistamiento: '2020-01-01'   # Fecha mínima de avistamientos
  min_anio_censo: 2018                   # Año mínimo de censos

# ============================================================================
# CONFIGURACIÓN DE MODELOS
# ============================================================================
models:
  +transient: false

  proyecto-civica:

    # ------------------------------------------------------------------------
    # STAGING — Capa Silver
    # Materializados como vista. Apuntan a SILVER_DB del entorno actual.
    # ------------------------------------------------------------------------
    staging:
      +materialized: view
      +database: "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_SILVER_DB"

      # Limpieza 1:1 del raw de AVISTAMIENTOS (AREAS + OBSERVACIONES)
      avistamientos:
        +schema: avistamientos

      # Limpieza 1:1 del raw de ESPECIES (CATALOGO + CENSOS)
      especies:
        +schema: especies

      # Tablas Silver normalizadas que combinan varias fuentes
      mix:
        +schema: mix

    # ------------------------------------------------------------------------
    # MARTS — Capa Gold
    # Materializados como tabla. Apuntan a GOLD_DB del entorno actual.
    # ------------------------------------------------------------------------
    marts:
      +materialized: table
      +database: "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_GOLD_DB"

      core:
        +schema: core

        # Modelos intermedios: vistas en schema separado, no expuestos al usuario
        intermediate:
          +materialized: view
          +schema: intermediate

# ============================================================================
# SEEDS — Tablas de referencia pequeñas
# Van a BRONZE_DB como tablas estáticas de lookup.
# ============================================================================
seeds:
  +schema: seed_data
  +database: "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_BRONZE_DB"

  proyecto-civica:
    provincia_ccaa:
      +column_types:
        id_provincia: INTEGER
        nombre:       VARCHAR(100)
        ccaa:         VARCHAR(100)
        codigo_ine:   VARCHAR(2)
        pais:         VARCHAR(50)

    estado_conservacion:
      +column_types:
        id_estado:    INTEGER
        codigo:       VARCHAR(10)
        descripcion:  VARCHAR(200)
        nivel_riesgo: INTEGER
        fuente:       VARCHAR(20)

    tipo_amenaza:
      +column_types:
        id_tipo_amenaza: INTEGER
        nombre:          VARCHAR(100)
        descripcion:     VARCHAR(300)

# ============================================================================
# SNAPSHOTS — SCD Tipo 2
# Viven en SILVER_DB, schema snapshots, como tablas no-transient.
# ============================================================================
snapshots:
  +transient: false
  +target_database: "{{ env_var('DBT_ENVIRONMENTS', 'FAIL') }}_SILVER_DB"
  +target_schema: snapshots

# ============================================================================
# TESTS
# ============================================================================
tests:
  +store_failures: false
  +severity: error